<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a73e8"/>
      <stop offset="100%" style="stop-color:#0d47a1"/>
    </linearGradient>
    <linearGradient id="nodeGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#64b5f6"/>
      <stop offset="100%" style="stop-color:#42a5f5"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="4" y="4" width="248" height="248" rx="40" ry="40" fill="url(#bg)"/>

  <!-- Edges (connections between nodes) -->
  <!-- Top to center -->
  <line x1="128" y1="58" x2="128" y2="108" stroke="#90caf9" stroke-width="3" stroke-opacity="0.7"/>
  <!-- Center to bottom-left -->
  <line x1="128" y1="148" x2="78" y2="198" stroke="#90caf9" stroke-width="3" stroke-opacity="0.7"/>
  <!-- Center to bottom-right -->
  <line x1="128" y1="148" x2="178" y2="198" stroke="#90caf9" stroke-width="3" stroke-opacity="0.7"/>
  <!-- Top to right -->
  <line x1="128" y1="58" x2="198" y2="98" stroke="#90caf9" stroke-width="2.5" stroke-opacity="0.5"/>
  <!-- Right to center -->
  <line x1="198" y1="98" x2="148" y2="128" stroke="#90caf9" stroke-width="2.5" stroke-opacity="0.5"/>
  <!-- Top to left -->
  <line x1="128" y1="58" x2="58" y2="98" stroke="#90caf9" stroke-width="2.5" stroke-opacity="0.5"/>
  <!-- Left to center -->
  <line x1="58" y1="98" x2="108" y2="128" stroke="#90caf9" stroke-width="2.5" stroke-opacity="0.5"/>
  <!-- Bottom-left to bottom-right -->
  <line x1="78" y1="198" x2="178" y2="198" stroke="#90caf9" stroke-width="2" stroke-opacity="0.4"/>

  <!-- Arrow heads on key edges -->
  <!-- Arrow: center to bottom-left -->
  <polygon points="82,193 72,198 82,203" fill="#90caf9" fill-opacity="0.8"/>
  <!-- Arrow: center to bottom-right -->
  <polygon points="174,193 184,198 174,203" fill="#90caf9" fill-opacity="0.8"/>

  <!-- Nodes -->
  <!-- Top node (main/root) -->
  <circle cx="128" cy="52" r="20" fill="url(#nodeGlow)" stroke="#fff" stroke-width="2.5"/>
  <!-- Center node (hub) -->
  <circle cx="128" cy="128" r="24" fill="#ffffff" stroke="#64b5f6" stroke-width="3"/>
  <!-- Left node -->
  <circle cx="58" cy="98" r="14" fill="url(#nodeGlow)" stroke="#fff" stroke-width="2"/>
  <!-- Right node -->
  <circle cx="198" cy="98" r="14" fill="url(#nodeGlow)" stroke="#fff" stroke-width="2"/>
  <!-- Bottom-left node -->
  <circle cx="78" cy="198" r="16" fill="#ffb74d" stroke="#fff" stroke-width="2"/>
  <!-- Bottom-right node -->
  <circle cx="178" cy="198" r="16" fill="#81c784" stroke="#fff" stroke-width="2"/>

  <!-- Center node icon: magnifying glass / analysis symbol -->
  <circle cx="124" cy="124" r="10" fill="none" stroke="#1a73e8" stroke-width="2.5"/>
  <line x1="131" y1="131" x2="140" y2="140" stroke="#1a73e8" stroke-width="2.5" stroke-linecap="round"/>

  <!-- "SF" text at top node -->
  <text x="128" y="57" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#0d47a1">SF</text>
</svg>
