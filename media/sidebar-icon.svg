<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- Monochrome icon for VS Code activity bar (inherits editor foreground color) -->

  <!-- Edges -->
  <line x1="12" y1="4" x2="12" y2="10" stroke="currentColor" stroke-width="1.2" stroke-opacity="0.6"/>
  <line x1="12" y1="14" x2="6" y2="20" stroke="currentColor" stroke-width="1.2" stroke-opacity="0.6"/>
  <line x1="12" y1="14" x2="18" y2="20" stroke="currentColor" stroke-width="1.2" stroke-opacity="0.6"/>
  <line x1="12" y1="4" x2="4" y2="9" stroke="currentColor" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="4" y1="9" x2="10" y2="12" stroke="currentColor" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="12" y1="4" x2="20" y2="9" stroke="currentColor" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="20" y1="9" x2="14" y2="12" stroke="currentColor" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Nodes -->
  <circle cx="12" cy="4" r="2.2" fill="currentColor"/>
  <circle cx="12" cy="12" r="2.8" fill="none" stroke="currentColor" stroke-width="1.5"/>
  <circle cx="4" cy="9" r="1.6" fill="currentColor" fill-opacity="0.7"/>
  <circle cx="20" cy="9" r="1.6" fill="currentColor" fill-opacity="0.7"/>
  <circle cx="6" cy="20" r="1.8" fill="currentColor"/>
  <circle cx="18" cy="20" r="1.8" fill="currentColor"/>

  <!-- Magnifying glass in center node -->
  <circle cx="11.2" cy="11.2" r="1.3" fill="none" stroke="currentColor" stroke-width="1"/>
  <line x1="12.1" y1="12.1" x2="13.4" y2="13.4" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
</svg>
